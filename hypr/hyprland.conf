monitor=,preferred,auto,1

env=QT_IM_MODULE,fcitx
env=XMODIFIERS,@im=fcitx

exec-once=hyprpaper
exec-once=waybar
exec-once=dunst
exec-once=fcitx5 -d

input {
    kb_layout=jp
    follow_mouse=1
    touchpad {
        natural_scroll=true
    }
}

general {
    gaps_in=5
    gaps_out=10
    border_size=2
    col.active_border=rgba(ca9ee6ff) rgba(85c1dcff) 45deg
    col.inactive_border=rgba(414559aa)
}

decoration {
    rounding=10
    blur {
        enabled=true
        size=5
        passes=2
    }
    shadow {
        enabled=true
        range=4
        render_power=3
        color=rgba(1a1a2eee)
    }
}

animations {
    enabled=true
}

$mod=SUPER

bind=$mod,Return,exec,kitty
bind=$mod,Q,killactive
bind=$mod,A,exec,rofi -show drun
bind=$mod,F,fullscreen
bind=$mod,1,workspace,1
bind=$mod,2,workspace,2
bind=$mod,3,workspace,3
bind=$mod,4,workspace,4
bind=$mod,5,workspace,5


